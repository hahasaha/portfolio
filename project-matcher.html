<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Case Study — Sahand Hajizadeh</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a1a14'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Georgia,serif' font-style='italic' font-size='20' fill='%23c4aff0'>S</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cream:#f5f0e2;
  --ink:#1a1a14;
  --ink-60:rgba(26,26,20,0.6);
  --ink-15:rgba(26,26,20,0.1);
  --lavender:#c4aff0;
  --lavender-bg:#d8ccf8;
  --lavender-dark:#8b70d0;
  --green:#1a3d2e;
  --amber:#e8a040;
  --rule:rgba(26,26,20,0.1);
  --radius:20px;
}
html,body{height:100%;background:var(--cream);font-family:'DM Sans',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}

/* NAV */
.back-link{position:fixed;top:20px;left:24px;font-size:13px;font-weight:500;color:var(--ink-60);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.15s;}
.back-link:hover{color:var(--ink);}

/* CARD */
.card{width:100%;max-width:580px;background:var(--ink);border-radius:28px;overflow:hidden;overflow-y:auto;max-height:95vh;position:relative;}
.card-top{padding:40px 40px 32px;}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--lavender);margin-bottom:14px;}
.card-title{font-family:'DM Serif Display',serif;font-size:clamp(26px,5vw,38px);color:white;line-height:1.1;letter-spacing:-0.02em;margin-bottom:8px;}
.card-title em{font-style:italic;color:var(--lavender);}
.card-sub{font-size:14px;color:rgba(255,255,255,0.4);line-height:1.6;}

/* PROGRESS */
.progress-bar{height:2px;background:rgba(255,255,255,0.08);position:relative;overflow:hidden;}
.progress-fill{height:100%;background:var(--lavender);transition:width 0.5s cubic-bezier(0.16,1,0.3,1);}

/* QUESTION */
.question-wrap{padding:32px 40px 40px;min-height:280px;display:flex;flex-direction:column;}
.q-counter{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--lavender);margin-bottom:16px;}
.q-text{font-family:'DM Serif Display',serif;font-size:clamp(18px,3vw,24px);color:white;line-height:1.25;letter-spacing:-0.01em;margin-bottom:28px;}
.options{display:flex;flex-direction:column;gap:8px;flex:1;}
.opt{
  padding:14px 18px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.55);font-size:14px;font-weight:400;
  cursor:pointer;transition:all 0.2s cubic-bezier(0.16,1,0.3,1);
  text-align:left;display:flex;align-items:center;gap:12px;
}
.opt-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);flex-shrink:0;transition:all 0.2s;}
.opt:hover{border-color:rgba(196,175,240,0.4);color:white;background:rgba(196,175,240,0.08);}
.opt:hover .opt-dot{border-color:var(--lavender);}
.opt.selected{border-color:var(--lavender);background:rgba(196,175,240,0.12);color:white;}
.opt.selected .opt-dot{background:var(--lavender);border-color:var(--lavender);}

/* NEXT BTN */
.next-row{padding:0 40px 32px;display:flex;justify-content:flex-end;}
.btn-next{
  background:var(--lavender-bg);color:var(--ink);
  font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;
  padding:13px 28px;border-radius:50px;border:none;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);opacity:0;pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
.btn-next.visible{opacity:1;pointer-events:all;}
.btn-next:hover{background:var(--lavender);transform:translateY(-2px);box-shadow:0 4px 20px rgba(196,175,240,0.3);}

/* RESULT */
.result-wrap{padding:32px 40px 40px;display:none;flex-direction:column;gap:24px;overflow-y:auto;}
.result-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.25);}
.result-project{
  background:rgba(255,255,255,0.05);border:1.5px solid rgba(196,175,240,0.25);
  border-radius:16px;padding:24px;
}
.result-tag{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--lavender);margin-bottom:10px;}
.result-name{font-family:'DM Serif Display',serif;font-size:28px;color:white;letter-spacing:-0.02em;margin-bottom:8px;}
.result-name em{font-style:italic;color:var(--lavender);}
.result-why{font-size:13px;color:rgba(255,255,255,0.5);line-height:1.65;margin-bottom:20px;}
.result-stat{font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.2);margin-bottom:16px;}
.stat-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.stat-pill{font-size:12px;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.06);padding:5px 12px;border-radius:20px;}
.result-cta{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--lavender-bg);color:var(--ink);
  font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;
  padding:12px 24px;border-radius:50px;text-decoration:none;
  transition:all 0.25s cubic-bezier(0.16,1,0.3,1);
}
.result-cta:hover{background:var(--lavender);transform:translateY(-2px);}
.result-also{font-size:13px;color:rgba(255,255,255,0.3);margin-top:4px;}
.also-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.also-link{font-size:12px;color:rgba(196,175,240,0.6);text-decoration:none;padding:5px 12px;border:1px solid rgba(196,175,240,0.2);border-radius:20px;transition:all 0.2s;}
.also-link:hover{color:var(--lavender);border-color:rgba(196,175,240,0.4);}
.restart-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.35);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;padding:11px 22px;border-radius:50px;cursor:pointer;transition:all 0.2s;align-self:flex-start;}
.restart-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);}

/* TRANSITIONS */
.fade{animation:fadeIn 0.4s cubic-bezier(0.16,1,0.3,1);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="card">
  <a href="index.html" style="position:absolute;top:16px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-size:18px;color:rgba(255,255,255,0.4);text-decoration:none;transition:all 0.2s;z-index:10;" onmouseenter="this.style.background='rgba(255,255,255,0.15)';this.style.color='white'" onmouseleave="this.style.background='rgba(255,255,255,0.08)';this.style.color='rgba(255,255,255,0.4)'">×</a>
  <div class="card-top">
    <div class="eyebrow">Case study finder</div>
    <h1 class="card-title">Find the work that's <em>right for you.</em></h1>
    <p class="card-sub">4 quick questions. I'll point you to the most relevant project.</p>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="question-wrap" id="question-wrap">
    <div class="q-counter" id="q-counter">Question 1 of 4</div>
    <div class="q-text" id="q-text"></div>
    <div class="options" id="options"></div>
  </div>

  <div class="next-row">
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">Next →</button>
  </div>

  <div class="result-wrap" id="result-wrap"></div>
</div>

<script>
const questions = [
  {
    q: "What kind of product are you hiring a designer for?",
    opts: [
      { label: "A mobile app (iOS or Android)", tags: ["mobile"] },
      { label: "A web app or SaaS product", tags: ["web","enterprise"] },
      { label: "A marketing or lead-gen website", tags: ["growth"] },
      { label: "An internal tool or dashboard", tags: ["enterprise"] },
    ]
  },
  {
    q: "What matters most to you right now?",
    opts: [
      { label: "Growing users, signups, or revenue", tags: ["growth"] },
      { label: "Handling complex UX and information architecture", tags: ["enterprise","mobile"] },
      { label: "Building or scaling a design system", tags: ["mobile","systems"] },
      { label: "Shipping fast with high craft", tags: ["growth","enterprise"] },
    ]
  },
  {
    q: "How would you describe your team's scale?",
    opts: [
      { label: "Small and scrappy — moving fast", tags: ["growth"] },
      { label: "Mid-size, cross-functional teams", tags: ["enterprise","mobile"] },
      { label: "Large org, lots of stakeholders", tags: ["enterprise","systems"] },
      { label: "Just me or early stage", tags: ["growth","mobile"] },
    ]
  },
  {
    q: "What's the experience level you're looking for?",
    opts: [
      { label: "Someone who can own design end-to-end", tags: ["mobile","enterprise"] },
      { label: "A designer who can also build and ship", tags: ["growth"] },
      { label: "A strategic design partner with deep craft", tags: ["enterprise","systems"] },
      { label: "Someone with proven impact and metrics", tags: ["growth","mobile"] },
    ]
  }
];

const projects = {
  golf: {
    tag: "UX · Web · Growth",
    name: "Golf <em>Ranch.</em>",
    why: "You're looking for a designer who drives real business outcomes — not just pretty screens. Golf Ranch is the proof: full lead-gen platform, conversion stack, SEO overhaul, and measurable results.",
    stats: ["4× membership signups", "+25% organic traffic", "6 locations", "Webflow + GA4 + GTM"],
    url: "golf-ranch.html",
    cta: "Open case study →",
    key: "growth"
  },
  inkwell: {
    tag: "Enterprise UX · Dashboards · AI",
    name: "Ink<em>well.</em>",
    why: "You need someone who can navigate complex information architecture, enterprise workflows, and high-stakes UI decisions. Inkwell is that work — scenario comparison dashboards, flag annotation systems, GIS mapping.",
    stats: ["Dashboards", "Workflow UX", "AI integration", "GIS mapping"],
    url: "inkwell.html",
    cta: "View case study (password: sahand2026) →",
    key: "enterprise"
  },
  evernote: {
    tag: "Mobile · Design Systems · iOS & Android",
    name: "Ever<em>note.</em>",
    why: "You're scaling a product with millions of users and need someone who's done it before. 250M+ users, full mobile redesign, design system built from scratch. 4.7 years of deep, sustained craft.",
    stats: ["250M+ users", "iOS & Android", "Design system", "4.7 years"],
    url: "evernote.html",
    cta: "View case study →",
    key: "mobile"
  }
};

const also = {
  golf: ["Inkwell", "Evernote"],
  inkwell: ["Evernote", "Golf Ranch"],
  evernote: ["Inkwell", "Golf Ranch"]
};

const alsoUrls = { "Golf Ranch": "golf-ranch.html", "Inkwell": "inkwell.html", "Evernote": "evernote.html" };

let current = 0;
let answers = [];
let selected = null;

function render() {
  const q = questions[current];
  document.getElementById('q-counter').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress').style.width = `${(current / questions.length) * 100}%`;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt fade';
    btn.style.animationDelay = `${i * 0.06}s`;
    btn.innerHTML = `<span class="opt-dot"></span>${o.label}`;
    btn.onclick = () => selectOpt(btn, o, i);
    opts.appendChild(btn);
  });

  selected = null;
  document.getElementById('btn-next').classList.remove('visible');
  document.querySelector('.question-wrap').classList.add('fade');
}

function selectOpt(btn, opt, idx) {
  document.querySelectorAll('.opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = opt;
  document.getElementById('btn-next').classList.add('visible');
  if (current === questions.length - 1) {
    document.getElementById('btn-next').textContent = 'See my result →';
  }
}

function nextQuestion() {
  if (!selected) return;
  answers.push(selected.tags);
  if (current < questions.length - 1) {
    current++;
    render();
  } else {
    showResult();
  }
}

function showResult() {
  const scores = { golf: 0, inkwell: 0, evernote: 0 };
  answers.forEach(tags => {
    tags.forEach(tag => {
      if (tag === 'growth') scores.golf += 2;
      if (tag === 'enterprise') scores.inkwell += 2;
      if (tag === 'mobile' || tag === 'systems') scores.evernote += 2;
      if (tag === 'mobile') scores.golf += 0.5;
      if (tag === 'web') scores.golf += 1;
    });
  });

  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const proj = projects[winner];
  const alsoList = also[winner];

  document.getElementById('progress').style.width = '100%';
  document.getElementById('question-wrap').style.display = 'none';
  document.querySelector('.next-row').style.display = 'none';

  const rw = document.getElementById('result-wrap');
  rw.style.display = 'flex';
  rw.innerHTML = `
    <div class="result-label fade">Your match</div>
    <div class="result-project fade" style="animation-delay:0.1s">
      <div class="result-tag">${proj.tag}</div>
      <div class="result-name">${proj.name}</div>
      <p class="result-why">${proj.why}</p>
      <div class="result-stat">Key outcomes</div>
      <div class="stat-pills">${proj.stats.map(s => `<span class="stat-pill">${s}</span>`).join('')}</div>
      <a href="${proj.url}" class="result-cta">${proj.cta}</a>
    </div>
    <div class="fade" style="animation-delay:0.2s">
      <p class="result-also">Also worth looking at</p>
      <div class="also-links">
        ${alsoList.map(name => `<a href="${alsoUrls[name]}" class="also-link">${name} →</a>`).join('')}
      </div>
    </div>
    <button class="restart-btn fade" style="animation-delay:0.3s" onclick="restart()">← Start over</button>
  `;
}

function restart() {
  current = 0;
  answers = [];
  selected = null;
  document.getElementById('question-wrap').style.display = 'flex';
  document.querySelector('.next-row').style.display = 'flex';
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('btn-next').textContent = 'Next →';
  render();
}

render();
</script>
</body>
</html>
